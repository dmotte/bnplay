<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <title>BNPlay - audio tag version</title>

    <link rel="icon" href="favicon.png" />

    <style type="text/css">
      :root {
        color-scheme: light dark;

        --btn-bg: #eee;
        --btn-text: #000;
        --btn-border: #888;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --btn-bg: #000;
          --btn-text: #ccc;
          --btn-border: #888;
        }
      }

      body,
      td,
      th {
        font-family: sans-serif;
      }

      #dialogMsg::backdrop {
        background-color: #1118;
        backdrop-filter: blur(3px);
      }

      .text-center {
        text-align: center;
      }

      .text-minor {
        font-size: 14px;
        color: #888;
      }

      .btn-ctrl {
        background-color: var(--btn-bg);
        color: var(--btn-text);
        border: 1px solid var(--btn-border);
        padding: 20px 30px;
        font-weight: bold;
      }
    </style>

    <script type="module">
      // Brown Noise Player
      class BNP {
        static switchMillis = 30_000;

        static player1;
        static player2;
        static timer;

        static switchPlayer() {
          let result = null;

          if (this.player1.paused && !this.player2.paused) {
            // Player 2 is playing. Switch to player 1
            result = this.player1.play();
            this.player2.pause();
            this.player2.currentTime = 0;
          } else if (!this.player1.paused && this.player2.paused) {
            // Player 1 is playing. Switch to player 2
            result = this.player2.play();
            this.player1.pause();
            this.player1.currentTime = 0;
          } else if (this.player1.paused && this.player2.paused) {
            // No player is playing. Start one player
            this.player1.currentTime = 0;
            result = this.player1.play();
          } else if (!this.player1.paused && !this.player2.paused) {
            // Both players are playing (this should never happen). Leave
            // only player 1 playing
            this.player2.pause();
            this.player2.currentTime = 0;
            result = Promise.resolve();
          }

          return result;
        }

        static initialize(player1, player2) {
          this.player1 = player1;
          this.player2 = player2;
        }

        static isPlaying() {
          return !(this.player1.paused && this.player2.paused);
        }

        static play() {
          if (this.isPlaying()) return Promise.resolve();

          this.player2.currentTime = 0;
          const result = this.player1.play();

          // We need to use an arrow function here, otherwise "this"
          // would be undefined inside the function
          this.timer = setInterval(
            () => this.switchPlayer(),
            this.switchMillis,
          );

          return result;
        }

        static stop() {
          if (!this.isPlaying()) return;

          clearInterval(this.timer);

          this.player1.pause();
          this.player2.pause();
          this.player1.currentTime = 0;
          this.player2.currentTime = 0;
        }

        static toggle() {
          if (this.isPlaying()) {
            this.stop();
            return Promise.resolve();
          } else return this.play();
        }
      }

      class App {
        static showModalMsg(msg = "") {
          const dialogMsg = document.getElementById("dialogMsg");

          if (msg === "") {
            dialogMsg.close();
            return;
          }

          dialogMsg.textContent = msg;
          dialogMsg.showModal();
        }

        ////////////////////////////////////////////////////////////////////////

        static update() {
          const btnToggle = document.getElementById("btnToggle"),
            divStatus = document.getElementById("divStatus");

          if (BNP.isPlaying()) {
            divStatus.textContent = "Playing...";
            document.title = "BNPlay - Playing";
            btnToggle.value = "\u23F9  STOP";
          } else {
            divStatus.textContent = "Stopped.";
            document.title = "BNPlay - Stopped";
            btnToggle.value = "\u25B6  PLAY";
          }
        }

        ////////////////////////////////////////////////////////////////////////

        static body_onload() {
          window.addEventListener("error", (event) => {
            this.showModalMsg(`ERROR: ${event.error}`);
          });

          window.addEventListener("unhandledrejection", (event) => {
            this.showModalMsg(`ERROR: ${event.reason}`);
          });

          BNP.initialize(
            document.getElementById("player1"),
            document.getElementById("player2"),
          );

          // Show the page body only when loaded, to prevent
          // the user from interacting early
          document.body.hidden = false;

          this.update();
        }

        static body_onkeydown(event) {
          const btnToggle = document.getElementById("btnToggle"),
            dialogMsg = document.getElementById("dialogMsg");

          if (dialogMsg.open) return;

          if (event.key === " ") btnToggle.click();
        }

        static btnToggle_onclick() {
          this.showModalMsg("Toggling playback state...");

          (async () => {
            await BNP.toggle();
            this.update();

            this.showModalMsg();
          })();
        }
      }

      window.App = App;
    </script>
  </head>

  <body hidden onload="App.body_onload()" onkeydown="App.body_onkeydown(event)">
    <audio hidden id="player1">
      <source src="https://dmotte.github.io/bnplay/bn-sample.flac" />
      Your browser does not support the HTML5 audio element
    </audio>
    <audio hidden id="player2">
      <source src="https://dmotte.github.io/bnplay/bn-sample.flac" />
      Your browser does not support the HTML5 audio element
    </audio>

    <div class="text-center">
      <h1>&#x1F50A; BNPlay</h1>

      <p>&#x1F3A7; <i>Audio tag version</i></p>
      <br />
      <div id="divStatus" class="text-minor"></div>
      <br />
      <input
        type="button"
        id="btnToggle"
        class="btn-ctrl"
        onfocus="this.blur()"
        onclick="App.btnToggle_onclick()"
      />
    </div>

    <dialog id="dialogMsg" closedby="none"></dialog>
  </body>
</html>
